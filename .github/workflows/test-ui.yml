name: UI — Playwright (Roles, Navigation, Full Flow)

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run navigation & role tests
        run: npx playwright test tests/ui/system/03-navigation-by-role.spec.ts --project=chromium
        env:
          CI: true

      - name: Run full flow & isolation tests
        run: npx playwright test tests/ui/system/04-full-flow.spec.ts --project=chromium
        env:
          CI: true

      - name: Run carregamento full progression (etapas 1-6)
        run: npx playwright test tests/ui/system/05-carregamento-etapas.spec.ts --project=chromium
        env:
          CI: true

      - name: Run liberacao cancellation tests
        run: npx playwright test tests/ui/system/06-liberacao-cancelamento.spec.ts --project=chromium
        env:
          CI: true

      - name: Run advanced agendamento tests
        run: npx playwright test tests/ui/system/07-agendamentos-avancados.spec.ts --project=chromium
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/ui/system/screenshots/
          retention-days: 7
